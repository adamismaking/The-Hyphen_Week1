<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hyphen - Elastic Organic Link</title>
    <style>
        body { margin: 0; background: #020202; overflow: hidden; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        #ui { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; opacity: 0.3; font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; }
        #connect-btn { 
            position: absolute; 
            bottom: 10%; 
            left: 50%; 
            transform: translateX(-50%); 
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); 
            color: #fff; 
            padding: 20px 40px; 
            cursor: pointer; 
            z-index: 20; 
            font-family: inherit; 
            transition: 0.5s; 
            letter-spacing: 2px; 
        }
        #connect-btn:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
        #tension-val { position: absolute; bottom: 30px; right: 30px; font-size: 1.5rem; font-weight: 100; opacity: 0.1; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="ui">SYSTEM_HYPHEN // HARDWARE_DEMO_V1<br>STATUS: <span id="status">STANDBY</span></div>
    <div id="tension-val">0.000</div>
    <button id="connect-btn">CONNECT_HARDWARE_INTERFACE</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let rawTension = 0;
        let smoothTension = 0;
        let port, reader;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 16;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambientLight);
        const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
        keyLight.position.set(5, 8, 10);
        scene.add(keyLight);
        const rimLight = new THREE.PointLight(0xffffff, 15, 30);
        rimLight.position.set(-10, -5, -5);
        scene.add(rimLight);
        const internalLightL = new THREE.PointLight(0xffffff, 5, 10);
        const internalLightR = new THREE.PointLight(0xffffff, 5, 10);
        scene.add(internalLightL, internalLightR);

        // --- POST PROCESSING ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.8);
        bloomPass.threshold = 0.9; 
        bloomPass.strength = 0.4;   
        bloomPass.radius = 0.2;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- THE HYPHEN ---
        const group = new THREE.Group();
        scene.add(group);
        const lavaMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            emissive: 0xffffff,
            emissiveIntensity: 0.1,
            roughness: 0.1,
            metalness: 0.5
        });
        const sphereGeo = new THREE.SphereGeometry(0.8, 64, 64);
        const orbLeft = new THREE.Mesh(sphereGeo, lavaMat);
        const orbRight = new THREE.Mesh(sphereGeo, lavaMat);
        group.add(orbLeft, orbRight);
        let bridge;
        const curve = new THREE.CubicBezierCurve3(
            new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()
        );

        // --- LAG-PROOF SERIAL READER ---
        async function connectSerial() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200, bufferSize: 255 }); // Tiny buffer = Force drop old data
                document.getElementById('status').innerText = "CONNECTED";
                document.getElementById('connect-btn').style.display = 'none';
                
                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                reader = textDecoder.readable.getReader();

                let accumulatedString = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    accumulatedString += value;
                    const lines = accumulatedString.split('\n');
                    
                    // Keep the last partial line for the next chunk
                    accumulatedString = lines.pop(); 

                    // Process all lines in this chunk, but ONLY the last valid 'T:' message
                    // This "jumps" to the most recent data point immediately.
                    let latestValue = null;
                    for (const line of lines) {
                        const match = line.match(/T:([0-9\.]+)/);
                        if (match) {
                            latestValue = parseFloat(match[1]);
                        }
                    }
                    
                    if (latestValue !== null) {
                        rawTension = latestValue;
                    }
                }
            } catch (err) { console.error(err); }
        }
        document.getElementById('connect-btn').addEventListener('click', connectSerial);

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            smoothTension = THREE.MathUtils.lerp(smoothTension, rawTension, 0.05);
            document.getElementById('tension-val').innerText = smoothTension.toFixed(3);

            const separation = 0.3 + (smoothTension * 4.5);
            const ambientX = Math.sin(time * 0.4) * 0.15;
            const ambientY = Math.cos(time * 0.3) * 0.15;
            
            orbLeft.position.set(-separation + ambientX, separation + ambientY, 0);  
            orbRight.position.set(separation + ambientX, -separation + ambientY, 0); 
            internalLightL.position.copy(orbLeft.position);
            internalLightR.position.copy(orbRight.position);

            curve.v0.copy(orbLeft.position);
            curve.v3.copy(orbRight.position);
            const bowX = Math.cos(time * 1.5) * 0.4;
            const bowY = Math.sin(time * 1.2) * 0.4;
            curve.v1.lerpVectors(curve.v0, curve.v3, 0.3);
            curve.v1.x += bowX; curve.v1.y += bowY;
            curve.v2.lerpVectors(curve.v0, curve.v3, 0.7);
            curve.v2.x -= bowX; curve.v2.y -= bowY;

            if (bridge) {
                group.remove(bridge);
                bridge.geometry.dispose();
            }

            const segments = 64;
            const radialSegments = 32; 
            const bridgeGeo = new THREE.TubeGeometry(curve, segments, 1, radialSegments, false);
            const tubePos = bridgeGeo.attributes.position;
            const tubeNormal = bridgeGeo.attributes.normal;
            
            for(let i=0; i<tubePos.count; i++) {
                const segmentIndex = Math.floor(i / (radialSegments + 1));
                const t = segmentIndex / segments;
                const distFromCenter = Math.abs(t - 0.5) * 2; 
                const centerR = 0.6 - (smoothTension * 0.45); 
                const endR = 0.8;
                const flareFactor = Math.min(1.0, Math.pow(distFromCenter, 4) * 1.5);
                const r = centerR + (endR - centerR) * flareFactor;
                const ripple = 1.0 + Math.sin(time * (15+smoothTension*30) + t * 25) * (0.01 + smoothTension * 0.04);
                const curvePoint = curve.getPointAt(t);
                const nx = tubeNormal.array[i*3];
                const ny = tubeNormal.array[i*3+1];
                const nz = tubeNormal.array[i*3+2];
                tubePos.array[i*3] = curvePoint.x + nx * r * ripple;
                tubePos.array[i*3+1] = curvePoint.y + ny * r * ripple;
                tubePos.array[i*3+2] = curvePoint.z + nz * r * ripple;
            }
            tubePos.needsUpdate = true;
            bridge = new THREE.Mesh(bridgeGeo, lavaMat);
            group.add(bridge);

            lavaMat.emissiveIntensity = 0.1 + (smoothTension * 0.8);
            bloomPass.strength = 0.2 + (smoothTension * 0.6);
            group.rotation.y = Math.sin(time * 0.5) * 0.2;
            group.rotation.x = Math.cos(time * 0.3) * 0.1;
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
